<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Inventory status</title>


    <!--    <link  layout:fragment="css" th:href="@{/css/main.css}" rel="stylesheet"/>-->
    <link rel="stylesheet" href="/css/main.css">
</head>

<body>

<div class="container">

    <h1 onclick="home()" style="cursor: pointer;">재고현황</h1>

    <div class="top-bar">


        <!--입력-->
        <div class="input-group">
            <input id="name" placeholder="상품명">
            <input id="quantity" placeholder="수량">
            <input id="price" placeholder="가격">
            <input id="purchase" type="date">
            <button class="add-btn" onclick="addProduct()">상품 추가</button>
        </div>


        <!--검색-->
        <div class="search-group">
            <form id="searchForm">
                <input id="search" name="search" placeholder="검색어를 입력하세요.">
                <button class="search-btn" type="submit">검색</button>
            </form>
        </div>


    </div>

    <hr>
    <!--정렬드롭다운-->
    <div class="sort-bar">
        <div class="dropdown">
            <div class="selected">최신순</div>
            <ul class="options">
                <li data-value="id,desc" class="active">최신순 ✔</li>
                <li data-value="price,asc">가격 낮은순</li>
                <li data-value="price,desc">가격 높은순</li>
                <li data-value="purchase,desc">최근 구매순</li>
                <li data-value="purchase,asc">오래된 구매순</li>
            </ul>
        </div>
    </div>


    <table border="1">
        <thead>
        <tr>
            <th>상품명</th>
            <th>수량</th>
            <th>가격</th>
            <th>구매날짜</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>


<div id="pagination"></div>


<script>
    let selectedId = null;
    let currentPage = 0;
    const pageSize = 10;
    let currentSort = "id,desc";
    let currentKeyword = "";
    let isPopState = false;

    const dropdown = document.querySelector(".dropdown");
    const selected = document.querySelector(".selected");
    const options = document.querySelectorAll(".options li");


    document.getElementById("searchForm").addEventListener("submit", function (event) {
        event.preventDefault();
        search();
    });

    // 목록출력
    function loadProducts() {
        let url = `/products?page=${currentPage}&size=${pageSize}&sort=${currentSort}`;

        if (currentKeyword !== "") {
            url += `&keyword=${currentKeyword}`;
        }

        fetch(url)
            .then(res => res.json())
            .then(data => {

                if (currentKeyword && data.content.length === 0 ) {
                    alert("검색 결과가 없습니다.");
                    return;
                }

                const list = document.getElementById("list");
                list.innerHTML = "";

                data.content.forEach(p => {
                    const tr = document.createElement("tr");

                    tr.innerHTML = `
                        <td>${p.name}</td>
                        <td>${p.quantity}</td>
                        <td>${formatPrice(p.price)}</td>
                        <td>${formatDate(p.purchase)}</td>
                        <td>
                            <button class="edit-btn" onclick="editRow(this, ${p.id})">수정</button>
                            <button class="delete-btn" onclick="deleteProduct(${p.id})">삭제</button>
                        </td>
                    `;

                    list.appendChild(tr);
                });

                renderPagination(data.totalPages, data.number);

            });
    }


    // 재고추가 및 수정
    function addProduct() {

        const data = {
            name: document.getElementById("name").value,
            quantity: document.getElementById("quantity").value,
            price: document.getElementById("price").value,
            purchase: document.getElementById("purchase").value
        };

        if (selectedId) {
            // 수정
            fetch("/products/" + selectedId, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            }).then(() => {
                selectedId = null;
                clearInput();
                loadProducts();
            });
        } else {
            // 추가
            fetch("/products", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            }).then(() => {
                clearInput();
                loadProducts();
            });
        }
    }


    // 재고삭제
    function deleteProduct(id) {
        fetch("/products/" + id, {
            method: "DELETE"
        }).then(() => loadProducts());
    }


    // 입력 초기화
    function clearInput() {
        document.getElementById("name").value = "";
        document.getElementById("quantity").value = "";
        document.getElementById("price").value = "";
        document.getElementById("purchase").value = "";
    }

    // 처음 실행 시 목록 불러오기
    initFromURL();


    // 상품검색
    function search() {
        event.preventDefault();

        const keyword = document.getElementById("search").value.trim();


                currentKeyword = keyword;
                currentPage = 0;

                updateURL();
                loadProducts();

    }

    function renderList(data) {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(p => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
            <td>${p.name}</td>
            <td>${p.quantity}</td>
            <td>${formatPrice(p.price)}</td>
            <td>${formatDate(p.purchase)}</td>
            <td>
                <button onclick="deleteProduct(${p.id})">삭제</button>
                <button onclick="editRow(this, ${p.id})">수정</button>
            </td>
        `;

            list.appendChild(tr);
        });
    }

    // 가격
    function formatPrice(price) {
        if (!price) return 0;
        return "₩" + Number(price).toLocaleString();
    }


    // 날짜형식 변경
    function formatDate(date) {
        if (!date) return "";
        return date.replaceAll("-", ".");
    }


    // 상품수정
    function editRow(btn, id) {
        const tr = btn.closest("tr");

        const tds = tr.children;

        const name = tds[0].innerText;
        const quantity = tds[1].innerText;
        const price = tds[2].innerText.replace(/[₩,]/g, "");
        const purchase = tds[3].innerText.replace(/\./g, "-");

        tr.innerHTML = `
        <td><input value="${name}"></td>
        <td><input value="${quantity}"></td>
        <td><input value="${price}"></td>
        <td><input type="date" value="${purchase}"></td>
        <td>
            <button onclick="saveRow(this, ${id})">저장</button>
            <button onclick="loadProducts()">취소</button>
        </td>
    `;
    }

    // 수정하고 저장
    function saveRow(btn, id) {
        const tr = btn.closest("tr");
        const inputs = tr.querySelectorAll("input");

        const data = {
            name: inputs[0].value,
            quantity: inputs[1].value,
            price: inputs[2].value,
            purchase: inputs[3].value
        };

        fetch("/products/" + id, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        }).then(() => {
            loadProducts();
        });
    }


    // 페이지버튼
    function renderPagination(totalPages, pageNumber) {
        const pagination = document.getElementById("pagination");
        pagination.innerHTML = "";

        const groupSize = 5;
        const group = Math.floor(pageNumber / groupSize);

        const start = group * groupSize;
        const end = Math.min(start + groupSize, totalPages);

        // 이전 버튼
        if (start > 0) {
            const prevBtn = document.createElement("button");
            prevBtn.innerText = "이전";

            prevBtn.onclick = () => {
                currentPage = start - 1;
                updateURL();
                loadProducts();
            };

            pagination.appendChild(prevBtn);
        }


        // 페이지 번호
        for (let i = start; i < end; i++) {
            const btn = document.createElement("button");
            btn.innerText = i + 1;

            if (i === pageNumber) {
                btn.classList.add("active")
            }

            btn.onclick = () => {
                currentPage = i;
                loadProducts();
            };

            pagination.appendChild(btn);
        }


        // 다음 버튼
        if (end < totalPages) {
            const nextBtn = document.createElement("button");
            nextBtn.innerText = "다음";

            nextBtn.onclick = () => {
                currentPage = end;
                loadProducts();
            };

            pagination.appendChild(nextBtn);
        }

        /*for (let i = 0; i < totalPages; i++) {
            const btn = document.createElement("button");

            btn.innerText = i + 1;

            // 현재 페이지
            if (i === pageNumber) {
                btn.style.fontWeight = "bold";
                btn.style.backgroundColor = "#ddd";
            }



            btn.onclick = () => {
                currentPage = i;
                loadProducts();
            };

            pagination.appendChild(btn);
        }*/
    }


    // 정렬
    selected.addEventListener("click", () => {
        dropdown.classList.toggle("open");
    });

    // 옵션 클릭
    options.forEach(option => {
        option.addEventListener("click", () => {
            const value = option.getAttribute("data-value");
            const text = option.innerText.replace(" ✔", "");

            // 텍스트 변경
            selected.innerText = text;

            // 기존 선택 제거
            options.forEach(o => {
                o.classList.remove("active");
                o.innerText = o.innerText.replace(" ✔", "");
            });

            // 선택 표시
            option.classList.add("active");
            option.innerText = text + " ✔";

            // 정렬값 적용
            currentSort = value;
            currentPage = 0;

            updateURL();
            loadProducts();

            // 닫기
            dropdown.classList.remove("open");
        });
    });

    // 바깥 클릭 시 닫기
    document.addEventListener("click", (e) => {
        if (!dropdown.contains(e.target)) {
            dropdown.classList.remove("open");
        }
    });


    // 뒤로가기 유지
    function updateURL() {
        if (isPopState) return;

        const params = new URLSearchParams();

        params.set("page", currentPage);
        params.set("size", pageSize);

        if (currentKeyword) {
            params.set("keyword", currentKeyword);
        }

        if (currentSort) {
            params.set("sort", currentSort);
        }

        const newUrl = "/?" + params.toString();
        window.history.pushState({}, "", newUrl);
    }


    // 상태복원
    function initFromURL() {
        const params = new URLSearchParams(window.location.search);

        currentPage = parseInt(params.get("page")) || 0;
        currentKeyword = params.get("keyword") || "";
        currentSort = params.get("sort") || "id,desc";

        // 검색창에도 반영
        document.getElementById("search").value = currentKeyword;

        options.forEach(option => {
            if (option.getAttribute("data-value") === currentSort) {
                const text = option.innerText.replace(" ✔", "");

                selected.innerText = text;

                option.classList.add("active");
                option.innerText = text + " ✔";
            } else {
                option.classList.remove("active");
                option.innerText = option.innerText.replace(" ✔", "");
            }
        });


        loadProducts();
    }

    window.onpopstate = function () {
        isPopState = true;
        initFromURL();
        isPopState = false;
    };


    // 홈버튼
    function home() {
        currentPage = 0;
        currentKeyword = "";
        currentSort = "id,desc";

        document.getElementById("search").value="";

        updateURL();
        loadProducts();
    }

</script>


</body>
</html>
